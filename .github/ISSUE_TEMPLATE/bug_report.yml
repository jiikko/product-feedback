name: Bug Report
description: 不具合や問題を報告する
title: "[Bug] "
labels:
  - bug
body:
  - type: dropdown
    id: product
    attributes:
      label: Product
      description: 対象のプロダクトを選択してください。
      options:
        - BabyNote
        - DotfilesSyncer
        - DualNote
        - Multi-Video Player for Dropbox
        - SnapTrim
        - ThumbnailThumb
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: アプリバージョン
      description: "例: 1.2.3"
      placeholder: 1.2.3
    validations:
      required: true

  - type: input
    id: os_device
    attributes:
      label: OSバージョン / 端末名
      description: "例: iOS 18.2 / iPhone 15 Pro"
      placeholder: iOS 18.2 / iPhone 15 Pro
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 問題が発生するまでの手順を記入してください。
      placeholder: |
        1. ...を開く
        2. ...をタップ
        3. ...が発生する
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待した結果
      placeholder: 本来どうなるべきだったかを記入してください。
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の結果
      placeholder: 実際に何が起きたかを記入してください。
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: 補足情報
      description: 必要に応じてスクリーンショットや動画、ログを添付してください。
      placeholder: 追加情報があれば記入してください。
    validations:
      required: false
